    ProjectId:
      name: "id"
      in: path
      required: true
      schema:
        type: string
      description: "项目 ID"
    UserId:
      name: "userId"
      in: path
      required: true
      schema:
        type: string
      description: "用户 ID"
    DriverId:
      name: "id"
      in: path
      required: true
      schema:
        type: string
      description: "Driver ID"
    OutcomeId:
      name: "id"
      in: path
      required: true
      schema:
        type: string
      description: "Outcome ID"
    RequirementId:
      name: "id"
      in: path
      required: true
      schema:
        type: string
      description: "Requirement ID"
    ConflictId:
      name: "id"
      in: path
      required: true
      schema:
        type: string
      description: "Conflict ID"
    EvidenceId:
      name: "id"
      in: path
      required: true
      schema:
        type: string
      description: "证据片段 ID"
    JobId:
      name: "id"
      in: path
      required: true
