  # ── §3A 游客会话与认领 ──

  /guest-sessions:
    post:
      tags: ["游客会话"]
      summary: "签发游客会话"
      description: |
        签发游客会话，返回 `session_key`（原始凭证只签发一次）。游客在同一浏览器中同意协议后，可完成真实快速问诊、恢复当前会话、复制和下载当前简报，不要求先注册（对齐 §3A.1、ADR-021、PRD §10.2）。

        `session_key` 为至少 128 bit 熵的随机凭证，不可是邮箱、电话或姓名；数据库只存 `HMAC-SHA-256(server_pepper, session_key)` 摘要。签发响应同时通过 `Set-Cookie` 下发名为 `guest_session` 的 Cookie，标记 `HttpOnly; Secure; SameSite=Strict`。后续任何端点不再返回原始凭证。清除凭证、换浏览器或换设备后，系统不承诺恢复未绑定账户的游客数据。

        公开端点，无需认证。签发前没有稳定 actor，因此不使用通用幂等记录；断线重试可以产生新的空游客会话，旧会话按保留策略清理。
      operationId: "createGuestSession"
      security: []
      responses:
        "201":
          description: "游客会话签发成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuestSessionCreateResponse"
              examples:
                default:
                  value:
                    data:
                      id: "GST_..."
                      session_key: "sk_..."
                      created_at: "2026-07-01T08:00:00Z"
                    meta:
                      request_id: "REQ_..."
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /guest-sessions/current:
    get:
      tags: ["游客会话"]
      summary: "恢复当前会话"
      description: |
        通过 `X-Session-Key` Header 或 `guest_session` Cookie 认证，获取当前游客会话。会话不存在或凭证无效时返回 `404 RESOURCE_NOT_FOUND`（对齐 §3A.2）。
      operationId: "getCurrentGuestSession"
      security:
        - guestSessionAuth: []
        - guestSessionCookieAuth: []
      responses:
        "200":
          description: "当前游客会话"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentGuestSessionResponse"
              examples:
                default:
                  value:
                    data:
                      id: "GST_..."
                      created_at: "2026-07-01T08:00:00Z"
                      last_active_at: "2026-07-01T10:30:00Z"
                    meta:
                      request_id: "REQ_..."
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /quick-sessions/{id}/claim:
    post:
      tags: ["快速问诊"]
      summary: "认领指定快速问诊会话"
      description: |
        只认领路径指定的快速问诊会话，保留 `quick_session.id`、版本、问答、简报和协议来源，不复制为第二份会话（对齐 §3A.3、ADR-021）。同一游客身份下其他问诊或训练记录不受影响。

        **双重证明**：认领要求同时证明（1）登录身份有效；（2）持有该快速会话当前 `guest_session_id` 对应的游客凭证。浏览器通过 HttpOnly `guest_session` Cookie 自动携带游客凭证，非浏览器客户端可用 `X-Session-Key`。服务端计算 HMAC 摘要并等值查找，原始凭证不得进入日志。

        成功事务切换当前所有者、保存 `origin_guest_session_id`、更新 180 天账户期限并写审计；历史同意操作人不被改写。已被其他用户认领时返回 `409 QUICK_SESSION_CLAIMED`。凭证与会话不匹配时返回 `403 SESSION_CREDENTIAL_MISMATCH`。

        不接收请求体中的用户 ID 或 `session_key`。需 `Idempotency-Key`。
      operationId: "claimQuickSession"
      security:
        - bearerAuth: []
          guestSessionAuth: []
        - bearerAuth: []
          guestSessionCookieAuth: []
        - cookieAuth: []
