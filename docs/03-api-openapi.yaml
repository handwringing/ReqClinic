              items:
                $ref: "#/components/schemas/CoverageSlotState"
        meta:
          $ref: "#/components/schemas/Meta"

    QuickSessionUnderstandingResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
        data:
          type: object
          additionalProperties: false
          required: ["understanding_version", "summary", "updated_at", "updated_by"]
          properties:
            understanding_version:
              type: integer
              description: "当前理解版本号，对应会话的 current_understanding_version"
            summary:
