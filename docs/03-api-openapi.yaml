  /quick-sessions/{id}/upgrade:
    post:
      tags: ["快速问诊"]
      summary: "升级正式项目"
      description: |
        升级正式项目（对齐 §5A.15、ADR-022）。原子创建正式 `projects` + Owner 成员 + `intake`（`source_quick_session_id`）+ 复制候选 + `upgrade_records`；任一步失败完全回滚，保持 `brief_ready`，不产生半成品项目、重复候选或错误 `upgraded` 状态。同幂等键重试返回首次成功结果，不创建第二个项目。

        升级成功后，快速问诊与正式项目通过只读来源关系关联，二者后续版本分别演化；若创建后发现业务错误，只能归档/纠正正式项目并保留审计，不能删除升级来源关系后伪装未发生。

        授权：需调用方拥有该 quick session；本地开发和 demo 环境允许 guest 升级自己的 quick session，生产环境可收紧为正式登录用户；需有效协议同意记录。需 `Idempotency-Key`。
      operationId: "upgradeQuickSession"
      security:
        - bearerAuth: []
        - cookieAuth: []
      x-idempotent: true
      x-versioned: true
      parameters:
