        core_scenario:
          type: ["string", "null"]
        scope_included:
          type: array
          items:
            type: string
        scope_excluded:
          type: array
          items:
            type: string
        core_requirements:
          type: array
          items:
            type: object
        completion_criteria:
          type: array
          items:
            type: object
        candidate_options:
          type: array
          items:
            type: object
        constraints_risks:
          type: array
          items:
            type: object
        unknowns:
          type: array
          items:
            type: object
        recommended_next_step:
          type: ["string", "null"]

