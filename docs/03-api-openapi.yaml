    ReportId:
      name: "id"
      in: path
      required: true
      schema:
        type: string
      description: "报告 ID"
    ProjectReportId:
      name: "reportId"
      in: path
      required: true
      schema:
        type: string
      description: "项目内报告 ID（须归属于路径中的项目）"
    ChangePreviewId:
      name: "id"
      in: path
      required: true
      schema:
        type: string
      description: "变化预演 ID"
    ChangeId:
      name: "id"
      in: path
      required: true
      schema:
        type: string
      description: "变化 ID"
    DomainPackId:
      name: "id"
      in: path
      required: true
