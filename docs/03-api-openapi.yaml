    TrainingAttemptId:
      name: "id"
      in: path
      required: true
      schema:
        type: string
      description: "训练尝试 ID"

  # ── 通用响应 ──

  responses:
    ValidationError:
      description: "字段或 Schema 不合法"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            default:
              value:
                error:
                  code: "VALIDATION_ERROR"
                  message: "缺少必填字段。"
                  retryable: false
                  request_id: "REQ_..."
    AuthenticationRequired:
      description: "未认证或会话失效"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "AUTHENTICATION_REQUIRED"
              message: "未认证或会话已失效。"
              retryable: false
              request_id: "REQ_..."
    Forbidden:
      description: "当前主体缺少所需项目能力"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "FORBIDDEN"
              message: "当前用户无权执行此操作。"
              retryable: false
              request_id: "REQ_..."
    AIActionForbidden:
      description: "当前主体缺少项目能力，或尚未同意当前有效协议"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            capability_missing:
              value:
                error:
                  code: "FORBIDDEN"
                  message: "当前用户无权执行此操作。"
                  retryable: false
                  request_id: "REQ_..."
            agreement_required:
              value:
                error:
                  code: "AGREEMENT_REQUIRED"
                  message: "未同意有效协议，无法触发真实 AI 调用。"
                  retryable: false
                  request_id: "REQ_..."
    ResourceNotFound:
      description: "资源不存在或不可见"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "RESOURCE_NOT_FOUND"
              message: "资源不存在。"
              retryable: false
              request_id: "REQ_..."
    EvidenceNotFound:
      description: "证据片段不存在或不可见"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "EVIDENCE_NOT_FOUND"
              message: "证据片段不存在或不可见。"
              retryable: false
              request_id: "REQ_..."
    VersionConflict:
      description: "并发冲突：对象已被更新"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "VERSION_CONFLICT"
              message: "对象已被更新，请刷新后重试。"
              retryable: false
              request_id: "REQ_..."
    IdempotencyConflict:
      description: "幂等冲突：同一键不同请求体"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "IDEMPOTENCY_CONFLICT"
              message: "同一幂等键下请求体不一致。"
              retryable: false
              request_id: "REQ_..."
    BlockingConflict:
      description: "业务阻断：存在未解决的阻断项"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "BLOCKING_CONFLICT"
              message: "存在未解决的阻断项，无法完成操作。"
              retryable: false
              request_id: "REQ_..."
    TokenBudgetExceeded:
      description: "项目或任务 Token 预算不足"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "TOKEN_BUDGET_EXCEEDED"
              message: "项目 Token 预算不足，无法发起操作。"
              retryable: false
              request_id: "REQ_..."
    ModelRateLimited:
      description: "外部模型限流"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "MODEL_RATE_LIMITED"
              message: "外部模型限流，请稍后重试。"
              retryable: true
              request_id: "REQ_..."
    ModelUnavailable:
      description: "外部模型不可用"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "MODEL_UNAVAILABLE"
              message: "外部模型不可用，请稍后重试。"
              retryable: true
              request_id: "REQ_..."
    AgreementRequired:
      description: "未同意有效协议时触发真实 AI 调用（§2.2、§3B.6）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "AGREEMENT_REQUIRED"
              message: "未同意有效协议，无法触发真实 AI 调用。"
              retryable: false
              request_id: "REQ_..."
    UpgradeFailed:
      description: "升级失败或版本冲突（§5A.15、ADR-022）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            upgrade_failed:
              value:
                error:
                  code: "UPGRADE_FAILED"
                  message: "升级操作失败，事务已回滚。"
                  details:
                    - { idempotency_key: "...", failure_category: "storage" }
                  retryable: true
                  request_id: "REQ_..."
            version_conflict:
              value:
                error:
                  code: "VERSION_CONFLICT"
                  message: "对象已被更新，请刷新后重试。"
                  retryable: false
                  request_id: "REQ_..."
    QuickSessionClaimed:
      description: "指定快速问诊会话已被其他用户认领（§3A.3、ADR-021）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "QUICK_SESSION_CLAIMED"
              message: "该快速问诊会话已被其他用户认领。"
              details:
                - { quick_session_id: "QS_..." }
              retryable: false
              request_id: "REQ_..."
    SessionCredentialMismatch:
      description: "游客凭证不属于路径指定的快速问诊会话（§3A.3）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "SESSION_CREDENTIAL_MISMATCH"
              message: "当前游客凭证不能认领该快速问诊会话。"
              retryable: false
              request_id: "REQ_..."
    TrainingCaseNotFound:
      description: "训练案例 ID 或版本不存在（§12A.2）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "TRAINING_CASE_NOT_FOUND"
              message: "训练案例不存在。"
              retryable: false
              request_id: "REQ_..."
    BriefVersionNotFound:
      description: "需求简报指定版本不存在或不属于当前会话（§5A.9、§5A.10、§5A.11、§5A.12）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "BRIEF_VERSION_NOT_FOUND"
              message: "需求简报版本不存在。"
              retryable: false
              request_id: "REQ_..."
    CoverageInsufficient:
      description: "覆盖槽位未达到最低覆盖条件，拒绝生成简报（§5A.8）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "COVERAGE_INSUFFICIENT"
              message: "覆盖槽位未达最低条件，无法生成简报。"
              details:
                - { slot_id: "core_scenario", status: "not_started" }
              retryable: true
              request_id: "REQ_..."
    RateLimited:
      description: "应用层限流（§2.3），按 retry_after_seconds 重试"
      headers:
        X-RateLimit-Limit:
          description: "窗口内允许的最大请求数"
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: "窗口内剩余请求数"
          schema:
            type: integer
        X-RateLimit-Reset:
          description: "窗口重置时间（UTC ISO 8601）"
          schema:
            type: string
            format: date-time
        Retry-After:
          description: "建议重试等待秒数"
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "RATE_LIMITED"
              message: "应用层限流，请稍后重试。"
              details:
                - { retry_after_seconds: 60 }
              retryable: true
              request_id: "REQ_..."
    ModelBusy:
      description: "单项目并发未完成 AI Job 达上限（§2.3）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "MODEL_BUSY"
              message: "单项目并发 AI Job 达上限，请稍后重试。"
              retryable: true
              request_id: "REQ_..."
    QueueFull:
      description: "全局队列满，稍后重试（§2.3）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "QUEUE_FULL"
              message: "全局队列已满，请稍后重试。"
              retryable: true
              request_id: "REQ_..."
    RequestTimeout:
      description: "请求超时，AI 命令可轮询 Job 状态（§2.3）"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "REQUEST_TIMEOUT"
              message: "请求超时。AI 任务可轮询作业状态。"
              retryable: false
              request_id: "REQ_..."
    LegalHoldConflict:
      description: |
        存在法律保留或合同义务，暂停物理删除（§5.2、§5A.16）。软删除请求仍被记录，
        但物理清除暂停，直到法律保留解除。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            legal_hold:
              value:
                error:
                  code: "LEGAL_HOLD"
                  message: "存在法律保留或合同义务，暂停物理删除。"
                  details:
                    - { legal_hold: true, reason: "合同义务保留至 2027-01-01" }
                  retryable: false
                  request_id: "REQ_..."

  # ── 通用 Schema ──

  schemas:
    # ── 核心枚举 ──

    ProjectStatus:
      type: string
      enum:
        - "Draft"
        - "Ingesting"
        - "Eliciting"
        - "Reviewing"
        - "Baselined"
        - "Reporting"
        - "Released"
        - "Changing"
        - "Archived"
    DescriptiveEpistemicType:
      type: string
      enum: ["Fact", "Inference", "Assumption", "Proposal"]
      description: "Outcome、Job、Capability 等描述性实体可持久化的认识类型；与 DB epistemic_type CHECK 保持一致。"
    RequirementProvenance:
      type: string
      enum: ["explicitly_stated", "derived", "assumed", "proposed"]
    DriverType:
      type: string
      enum: ["goal", "outcome", "obligation", "risk", "problem", "opportunity"]
    ReviewAction:
      type: string
      enum: ["accept", "modify", "reject", "uncertain"]
    RequirementHorizon:
      type: string
      enum: ["now", "next", "later", "watch"]
    ScopeDisposition:
      type: string
      enum: ["included", "excluded"]
    RequirementStatus:
      type: string
      enum: ["candidate", "supported", "reviewed", "accepted", "implemented", "verified", "superseded", "retired"]
    CandidateEntityStatus:
      type: string
      enum: ["candidate", "supported", "reviewed", "accepted", "superseded", "retired"]
      description: "Driver/Outcome/Capability 等描述性候选实体的生命周期状态"
    AcceptanceCriterionStatus:
      type: string
      enum: ["draft", "reviewed", "accepted", "verified", "superseded"]
    ConflictStatus:
      type: string
      enum: ["open", "deciding", "resolved", "accepted_risk"]
    BaselineStatus:
      type: string
      enum: ["draft", "approved", "superseded"]
    ChangePreviewStatus:
      type: string
      enum: ["draft", "analyzing", "ready", "failed", "expired"]
    ChangeStatus:
      type: string
      enum: ["draft", "confirmed", "analyzing", "reviewing", "baselined", "withdrawn", "superseded"]
    FutureScenarioStatus:
      type: string
      enum: ["draft", "active", "triggered", "retired"]
    OperationalSignalStatus:
      type: string
      enum: ["draft", "active", "paused", "retired"]
    DomainProfileStatus:
      type: string
      enum: ["candidate", "under_review", "approved", "rejected", "superseded"]
    JobStatus:
      type: string
      enum: ["queued", "running", "validating", "retry_wait", "succeeded", "failed", "manual_review", "cancelled"]
    ReportStatus:
      type: string
      enum: ["draft", "gate_failed", "rendering", "staged", "ready", "released", "publish_failed", "superseded"]
    RiskLevel:
      type: string
      enum: ["unknown", "low", "medium", "high"]
    Sensitivity:
      type: string
      enum: ["public", "internal", "confidential", "restricted"]
    Severity:
      type: string
      enum: ["low", "medium", "high", "critical"]
    MemberStatus:
      type: string
      enum: ["active", "revoked"]
    ExtractionStatus:
      type: string
      enum: ["uploaded", "queued", "parsing", "parsed", "failed"]
    QuickSessionStatus:
      type: string
      enum:
        - "draft"
        - "clarifying"
        - "understanding_review"
        - "option_review"
        - "brief_ready"
        - "upgraded"
        - "archived"
      description: "快速问诊会话状态机：draft → clarifying → understanding_review → option_review → brief_ready → upgraded/archived"
    TrainingAttemptStatus:
      type: string
      enum:
        - "not_started"
        - "interviewing"
        - "summarizing"
        - "feedback_ready"
        - "retrying"
        - "completed"
      description: "训练尝试状态机：not_started → interviewing → summarizing → feedback_ready → retrying/completed"
    BriefViewType:
      type: string
      enum: ["simple", "exec"]
      description: "需求简报两类页面视图：simple（概述）/ exec（详细报告）"
    AgreementAction:
      type: string
      enum: ["accepted", "reaccepted", "withdrawn"]
      description: "协议同意动作：首次或非重大更新同意（accepted）、重大更新后重新同意（reaccepted）、撤回（withdrawn）"
    AgreementChangeType:
      type: string
      enum: ["major", "minor"]
      description: "协议更新类型：major（重大更新，需重新同意）/ minor（非重大更新，既有同意继续有效）"
    ActorKind:
      type: string
      enum: ["guest", "user"]
      description: "调用方身份：guest（凭 session_key 标识，不要求注册）/ user（正式登录认证）"
    CoverageSlot:
      type: string
      enum:
        - "expected_outcome"
        - "target_user"
        - "core_scenario"
        - "scope_boundary"
        - "completion_criteria"
        - "constraints_risks"
      description: "快速问诊六类信息覆盖槽位：expected_outcome（期望结果）/ target_user（目标用户/相关对象）/ core_scenario（核心场景）/ scope_boundary（范围边界）/ completion_criteria（完成判断）/ constraints_risks（约束与风险）"
    CoverageSlotStatus:
      type: string
      enum: ["not_started", "partial", "covered"]
      description: "覆盖槽位状态：not_started / partial / covered"
    QuickSessionSourceKind:
      type: string
      enum: ["custom", "sample", "training_fixture", "internal_test"]
      description: "快速问诊来源：custom（自定义输入）/ sample（示例案例）/ training_fixture（训练或评估 Fixture）/ internal_test（内部测试）。普通用户入口只暴露 custom/sample。"
    BriefExportType:
      type: string
      enum: ["copy", "download"]
      description: "简报导出类型：copy（复制）/ download（下载）"
    BriefUsefulnessRating:
      type: string
      enum: ["usable_with_minor_or_no_edits", "needs_major_revision", "not_usable"]
      description: "简报可用性反馈评级"
    AgreementScope:
      type: string
      enum: ["quick", "formal", "training", "all"]
      description: "协议同意适用范围"
    ProductEventEnvironment:
      type: string
      enum: ["demo", "development", "test", "pilot", "production"]
      description: "产品埋点环境"
    ProductEventMode:
      type: string
      enum: ["quick", "formal", "training", "entry"]
      description: "产品埋点业务模式；起始页事件可为 entry"
    ProductEventSourceKind:
      type: string
      enum: ["custom", "sample", "training_fixture", "internal_test"]
      description: "产品埋点来源类型"

    # ── 通用包装 ──

    Meta:
      type: object
      required: [request_id]
      additionalProperties: false
      properties:
        request_id:
          type: string
          description: "请求追踪 ID"
        cursor:
          type: ["string", "null"]
          description: "分页游标（列表端点）"
        has_more:
          type: boolean
          description: "是否有更多数据（列表端点）"

    ResponseMeta:
      type: object
      additionalProperties: false
      required: [request_id]
      properties:
        request_id:
          type: string
          description: "请求追踪 ID"
        cursor:
          type: ["string", "null"]
          description: "分页游标（列表端点）"
        has_more:
          type: boolean
          description: "是否有更多数据（列表端点）"

    AsyncAcceptedResponse:
      type: object
