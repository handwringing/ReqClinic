                value:
                  brief_version: 1
                  expected_quick_session_version: 3
      responses:
        "201":
          description: "升级成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickSessionUpgradeResponse"
              examples:
                default:
                  value:
                    data:
                      project_id: "PRJ_..."
                      upgrade_record_id: "UPG_..."
                    meta:
                      request_id: "REQ_..."
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/AgreementRequired"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          $ref: "#/components/responses/UpgradeFailed"
        "429":
          $ref: "#/components/responses/RateLimited"
        "504":
          $ref: "#/components/responses/RequestTimeout"

