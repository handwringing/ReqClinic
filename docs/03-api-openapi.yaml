            $ref: "#/components/schemas/BriefViewType"
          description: "投影视图类型：`simple` / `exec`，默认 `exec`"
        - name: "export_id"
          in: query
          required: false
          schema:
            type: string
          description: "已通过 POST 创建的 `export_id`；携带时复用既有签名导出，不携带时内部生成"
      responses:
        "200":
          description: "简报导出文件二进制流"
          headers:
            Content-Type:
              schema:
                type: string
              description: "text/markdown; charset=utf-8 或 application/pdf"
            Content-Disposition:
              schema:
                type: string
              description: "attachment; filename=\"brief-{version}-{view_type}.md\""
          content:
