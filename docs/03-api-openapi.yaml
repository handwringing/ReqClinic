        一句话输入只能产生候选，不得直接生成完整用户、场景、约束、预算、技术方案或验收结论。

        授权：`actor_kind=guest`（凭 `session_key`）或 `actor_kind=user`；需有效协议同意记录（未同意返回 `403 AGREEMENT_REQUIRED`）。需 `Idempotency-Key`。
