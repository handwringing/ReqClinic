      properties:
        id:
          type: string
          description: "未知项 ID"
        question:
          type: string
          description: "问题描述"
        impact:
          type: string
          description: "影响说明"
        is_blocking:
          type: boolean
          description: "是否阻断"
        suggested_responsible:
          type: ["string", "null"]
          description: "建议责任人"
        suggested_info_needed:
          type: ["string", "null"]
          description: "建议获得的信息"
        review_condition:
          type: ["string", "null"]
          description: "复查条件"
        created_at:
          type: string
          format: date-time
          description: "创建时间"
        resolved_at:
          type: ["string", "null"]
          format: date-time
          description: "已解决时间；未解决时为 null"
        status:
          type: string
          enum: ["open", "resolved"]
          description: "未知项状态"

