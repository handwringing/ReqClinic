              schema:
                type: string
            application/pdf:
              schema:
                type: string
                format: binary
        "302":
          description: "重定向到临时下载 URL（24 小时有效，与 §14.2 服务端临时导出文件默认期一致）"
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: "临时签名下载 URL"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/BriefVersionNotFound"
