      description: |
        下载指定版本的简报导出文件（对齐 §5A.11）。与 `POST .../exports` 配合使用：POST 创建一次性签名
        导出（返回 `export_id` 与 `expires_at`），本端点用于实际下载文件流；也可在未显式调用 POST 时直接
