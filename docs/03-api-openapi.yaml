  # ── §12B 产品埋点事件入口与指标 ──

  /events:
    post:
      tags: ["产品埋点"]
      summary: "批量或单条接收事件"
      description: |
        批量或单条接收产品埋点事件（对齐 §12B.1、PRD §12.5、ADD §18.3）。埋点用于验证产品流程和假设，不作为业务事实、需求证据、员工绩效或训练认证依据；业务审计日志与产品分析事件必须分开存储和授权。

        约束：
        - 按 `event_id` 全局去重；同一业务命令重试不得重复计入成功指标；
        - 未知 Schema 版本进隔离而非静默解析；
        - `analytics_session_id` 是非秘密分析 ID，不得使用游客认证 `session_key`；疑似认证凭证格式直接拒绝；
        - `attributes` 按 `event_name + event_schema_version` 的注册 Schema 校验，缺少事件必填字段或出现未知字段时拒绝；
        - 禁止字段：任何事件都不得包含原始需求文本、用户回答正文、材料片段、文件名、Prompt、模型完整输入输出、姓名、邮箱、电话、证件信息或协议正文；禁止字段必须被 Schema 校验拒绝；
        - 离线补发带上限，去重并设置上限；埋点失败不得阻断用户主流程；
        - Demo、内部测试、样例、自定义真实会话分层统计，默认产品指标排除 `internal_test`；客户端时间与服务端接收时间差异超阈值时标记时钟异常。

        授权：`actor_kind=guest` 或 `actor_kind=user`。响应 `202`（异步接收）。
      operationId: "postProductEvents"
      security:
        - guestSessionAuth: []
        - guestSessionCookieAuth: []
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductEventBatchRequest"
            examples:
              default:
                value:
                  events:
                    - event_id: "EVT_..."
                      event_name: "question_interaction"
                      event_schema_version: "1.0.0"
                      occurred_at: "2026-07-01T08:00:00Z"
                      environment: "pilot"
                      app_version: "1.0.0"
                      mode: "quick"
                      source_kind: "custom"
                      analytics_session_id: "AS_demo_001"
                      actor_key: null
                      stage: "clarifying"
                      experiment_id: null
                      attributes:
                        question_template_id: "QT_target_user"
                        action: "answered"
                        elapsed_ms: 4200
      responses:
        "202":
          description: "事件已接收"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductEventBatchResponse"
              examples:
                default:
                  value:
                    data:
                      accepted_count: 1
                      rejected_count: 0
                      duplicates_count: 0
                    meta:
                      request_id: "REQ_..."
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "429":
          $ref: "#/components/responses/RateLimited"

  /metrics/quick-completion-rate:
    get:
      tags: ["产品埋点"]
      summary: "最小 SQL 报表端点（可选）"
      description: |
        按 PRD §12.6 公式返回最小 SQL 报表（对齐 §12B.2）。可选端点，用于快速问诊完成率指标。默认产品指标排除 `internal_test`。
      operationId: "getQuickCompletionRate"
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: "observation_window"
          in: query
          schema:
            type: string
            default: "7d"
          description: "观测窗口（如 7d、30d）"
        - name: "source_kind"
          in: query
          schema:
            type: string
            enum: ["custom", "sample", "training_fixture", "internal_test"]
          description: "按来源筛选"
      responses:
        "200":
          description: "快速问诊完成率报表"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuickCompletionRateResponse"
              examples:
                default:
                  value:
                    data:
                      metric_name: "quick-completion-rate"
                      numerator: 120
                      denominator: 200
                      observation_window: "7d"
                      sample_size: 200
                      filters:
                        source_kind: "custom"
                        environment_exclude: ["internal_test"]
                      calculated_at: "2026-07-01T12:00:00Z"
                    meta:
                      request_id: "REQ_..."
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

# ──────────────────────────────────────────────────────────────────
# Components
# ──────────────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "session token"
      description: "Session-based Bearer token 认证（actor_kind=user）"
    cookieAuth:
      type: apiKey
      in: cookie
      name: "session"
      description: "Cookie 回退认证（actor_kind=user）"
    guestSessionAuth:
      type: apiKey
      in: header
      name: "X-Session-Key"
      description: "非浏览器客户端的游客会话凭证（actor_kind=guest）；原始值不可写入日志"
    guestSessionCookieAuth:
      type: apiKey
      in: cookie
      name: "guest_session"
      description: "浏览器 HttpOnly 游客会话 Cookie（actor_kind=guest）"

  parameters:
    IdempotencyKey:
      name: "Idempotency-Key"
      in: header
