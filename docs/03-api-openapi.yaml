      tags: ["基线与报告"]
      summary: "发布报告"
      description: |
        Reviewer/Owner 执行发布门禁并冻结 PDF 快照。

        需 `发布报告` 能力。
      operationId: "releaseReport"
      security:
        - bearerAuth: []
        - cookieAuth: []
      x-idempotent: true
      x-versioned: true
      parameters:
        - $ref: "#/components/parameters/ReportId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: ["expected_version"]
              properties:
                expected_version:
                  type: integer
                  description: "报告乐观锁版本号"
              example:
                expected_version: 1
      responses:
        "200":
          description: "报告已发布"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseReportResponse"
              examples:
                default:
                  value:
                    data:
                      id: "RPT_..."
                      project_id: "PRJ_..."
                      report_version: 1
                      status: "released"
                      file_sha256: "sha256:..."
                      released_by: "USR_001"
                      released_at: "2026-07-01T17:35:00Z"
                    meta:
                      request_id: "REQ_..."
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          $ref: "#/components/responses/BlockingConflict"
        "429":
          $ref: "#/components/responses/ModelRateLimited"
        "503":
          $ref: "#/components/responses/ModelUnavailable"

  /reports/{id}/file:
    get:
      tags: ["基线与报告"]
      summary: "下载报告"
      description: |
        具有导出能力时下载发布文件。报告未发布时返回 `404`，无导出能力时返回 `403`。

        需 `下载报告` 能力（Owner/Reviewer/Exporter）。
      operationId: "downloadReport"
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "200":
          description: "报告文件（PDF 二进制流）"
          headers:
            Content-Type:
              schema:
                type: string
              description: "application/pdf"
            Content-Disposition:
              schema:
                type: string
              description: "attachment; filename=\"report-{report_version}.pdf\""
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "429":
          $ref: "#/components/responses/ModelRateLimited"
        "503":
          $ref: "#/components/responses/ModelUnavailable"

  /projects/{id}/reports/{reportId}/download:
    get:
      tags: ["基线与报告"]
      summary: "下载已发布报告（项目作用域）"
      description: |
        项目作用域的等价下载端点（对齐 §10.6），行为与 `GET /reports/{id}/file` 一致，额外校验 `:id` 与
        `:reportId` 的归属关系（`report_snapshots.project_id` 必须等于路径中的项目 ID），以及当前用户在该
        项目上的成员资格与 `下载报告` 能力（Owner/Reviewer/Exporter）。

        报告未发布时返回 `404 RESOURCE_NOT_FOUND`；当前用户无导出能力时返回 `403 FORBIDDEN`。
      operationId: "downloadProjectReport"
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/ProjectReportId"
      responses:
        "200":
          description: "报告文件（PDF 二进制流）"
          headers:
            Content-Type:
              schema:
                type: string
              description: "application/pdf"
            Content-Disposition:
              schema:
                type: string
              description: "attachment; filename=\"report-{report_version}.pdf\""
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "302":
          description: "重定向到临时下载 URL（24 小时有效，与 §14.2 服务端临时导出文件默认期一致）"
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: "临时签名下载 URL"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "429":
          $ref: "#/components/responses/ModelRateLimited"
        "503":
          $ref: "#/components/responses/ModelUnavailable"

