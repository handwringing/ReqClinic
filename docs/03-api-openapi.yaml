            upgrade_record_id:
              type: string
              description: "升级记录 ID（UPG_...）"
        meta:
          $ref: "#/components/schemas/Meta"

    # ── 表达训练 ──

    TrainingCase:
      type: object
      additionalProperties: false
      description: "训练案例摘要"
      required: [id, name, category, difficulty_levels, latest_version, status]
      properties:
        id:
          type: string
          description: "案例逻辑 ID（case_id）"
        name:
          type: string
        category:
          type: string
        difficulty_levels:
          type: array
          items:
            type: string
            enum: ["easy", "medium", "hard"]
        latest_version:
          type: string
        status:
          type: string
          enum: ["draft", "active", "deprecated"]

    ListTrainingCasesResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TrainingCase"
        meta:
          $ref: "#/components/schemas/Meta"

    TrainingCaseVersionDetail:
      type: object
      additionalProperties: false
      description: "版本化训练案例公开详情（training_cases）；不得包含隐藏答案、完整披露规则或评分触发规则。"
      required: [id, version, name, status]
      properties:
        id:
          type: string
        version:
          type: string
        name:
          type: string
        public_brief:
          type: object
          additionalProperties: false
          description: "前端可展示的公开场景信息。"
          properties:
            role_label:
              type: string
            practice_goal:
              type: string
            visible_constraints:
              type: array
              items:
                type: string
        evaluation_dimensions:
          type: array
          description: "公开的评价维度名称，只用于告诉用户练习方向，不包含评分规则。"
          items:
            type: string
        status:
          type: string
          enum: ["draft", "active", "deprecated"]

    GetTrainingCaseVersionResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
        data:
          $ref: "#/components/schemas/TrainingCaseVersionDetail"
        meta:
          $ref: "#/components/schemas/Meta"

    TrainingAttempt:
      type: object
      additionalProperties: false
      description: "训练尝试（training_attempts）"
      required: [attempt_id, status, case_id, case_version, started_at]
      properties:
        attempt_id:
          type: string
          description: "训练尝试 ID（TA_...）"
        status:
          $ref: "#/components/schemas/TrainingAttemptStatus"
        case_id:
          type: string
        case_version:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: ["string", "null"]
          format: date-time

    TrainingAttemptCreateRequest:
      type: object
      additionalProperties: false
      required: ["case_id", "case_version"]
      properties:
        case_id:
          type: string
          description: "训练案例 ID ← training_attempts.case_id"
        case_version:
          type: string
          description: "案例版本 ← training_attempts.case_version"
        difficulty:
          type: ["string", "null"]
          enum: ["easy", "medium", "hard"]
          description: "难度等级 ← training_attempts.difficulty"

    TrainingAttemptCreateResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
        data:
          $ref: "#/components/schemas/TrainingAttempt"
        meta:
          $ref: "#/components/schemas/Meta"

    GetTrainingAttemptResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
        data:
          $ref: "#/components/schemas/TrainingAttempt"
        meta:
          $ref: "#/components/schemas/Meta"

    TrainingQuestionRequest:
      type: object
      additionalProperties: false
      required: ["question"]
      properties:
        question:
          type: string
          description: "用户追问；不记录正文到产品埋点，仅记 question_index 与 disclosure_rule_hit"

    TrainingSummaryRequest:
      type: object
      additionalProperties: false
      required: ["summary"]
      properties:
        summary:
          type: string
          description: "用户总结正文；只存哈希，不记录正文到产品埋点"

    TrainingSummaryResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
        data:
          type: object
          required: ["status"]
          properties:
            status:
              type: string
              enum: ["summarizing"]
        meta:
          $ref: "#/components/schemas/Meta"

    TrainingFeedback:
      type: object
      additionalProperties: false
      description: "训练反馈（training_feedback）"
      required: [coverage_score, missing_dimensions, improvement_suggestions, dimension_breakdown, improvement_examples]
      properties:
        coverage_score:
          type: number
          minimum: 0
          maximum: 1
          description: "0–1 之间的覆盖率"
        missing_dimensions:
          type: array
          items:
            type: string
        improvement_suggestions:
          type: array
          items:
            type: string
        dimension_breakdown:
          type: array
          description: "逐维评分依据，来自 rubric 与披露规则命中结果；AI 只能补充可解释建议，不能替代确定性覆盖检查"
          items:
            type: object
            additionalProperties: false
            required: ["dimension", "status", "evidence", "comment"]
            properties:
              dimension:
                type: string
              status:
                type: string
                enum: ["covered", "partial", "missing"]
              evidence:
                type: string
              comment:
                type: string
        improvement_examples:
          type: array
          description: "可执行的追问或总结改写示例"
          items:
            type: object
            additionalProperties: false
            required: ["before", "after", "reason"]
            properties:
              before:
                type: string
              after:
                type: string
              reason:
                type: string

    GetTrainingFeedbackResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
        data:
          $ref: "#/components/schemas/TrainingFeedback"
        meta:
          $ref: "#/components/schemas/Meta"

    TrainingRetryResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
        data:
          type: object
          required: ["new_attempt_id", "status"]
          properties:
            new_attempt_id:
              type: string
              description: "新建后续 Attempt ID，保留旧反馈"
            status:
              type: string
              enum: ["interviewing"]
        meta:
          $ref: "#/components/schemas/Meta"

    TrainingCompleteResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
        data:
          type: object
          required: ["attempt_id", "status", "completed_at"]
          properties:
            attempt_id:
              type: string
            status:
              type: string
              enum: ["completed"]
            completed_at:
              type: string
              format: date-time
        meta:
          $ref: "#/components/schemas/Meta"

    # ── 产品埋点 ──

    ProductEvent:
      type: object
      additionalProperties: false
      description: "产品埋点事件（product_events 公共字段）"
      required:
        - "event_id"
        - "event_name"
        - "event_schema_version"
        - "occurred_at"
        - "environment"
        - "app_version"
        - "mode"
        - "source_kind"
        - "analytics_session_id"
        - "attributes"
      properties:
        event_id:
          type: string
          description: "客户端或服务端生成的唯一事件 ID，用于去重"
        event_name:
          type: string
          description: "来自注册表的稳定名称"
        event_schema_version:
          type: string
          description: "事件字段契约版本"
        occurred_at:
          type: string
          format: date-time
          description: "UTC 事件发生时间"
        environment:
          $ref: "#/components/schemas/ProductEventEnvironment"
        app_version:
          type: string
          description: "产生事件的应用版本"
        mode:
          $ref: "#/components/schemas/ProductEventMode"
        source_kind:
          $ref: "#/components/schemas/ProductEventSourceKind"
        analytics_session_id:
          type: string
          pattern: "^AS_[A-Za-z0-9_-]+$"
          description: "非秘密分析会话 ID；对应 PRD 逻辑字段 session_key，但不得使用游客认证凭证"
        actor_key:
          type: ["string", "null"]
          description: "匿名或假名化用户键；不得使用邮箱、电话或姓名"
        stage:
          type: ["string", "null"]
          description: "当前业务步骤或正式项目章节"
        experiment_id:
          type: ["string", "null"]
          description: "产品实验标识；没有实验时不传"
        attributes:
          $ref: "#/components/schemas/ProductEventAttributes"

    ProductEventAttributes:
      type: object
      additionalProperties: false
      description: "事件专属字段的闭合集；服务端按 event_name + event_schema_version 再校验该事件所需字段"
      properties:
        selected_mode: { type: string, enum: [quick, formal, training] }
        action: { type: string }
        agreement_version: { type: string }
        slot_id: { type: string }
        from_status: { type: string }
        to_status: { type: string }
        blocking_unknown_count: { type: integer, minimum: 0 }
        question_template_id: { type: string }
        elapsed_ms: { type: integer, minimum: 0 }
        brief_version: { type: integer, minimum: 1 }
        option_id: { type: string }
        matches_ai_recommendation: { type: boolean }
        is_incomplete: { type: boolean }
        view_type: { $ref: "#/components/schemas/BriefViewType" }
        export_type: { $ref: "#/components/schemas/BriefExportType" }
        rating: { type: string }
        expected_use: { type: ["string", "null"] }
        last_stage: { type: string }
        coverage_count: { type: integer, minimum: 0 }
        inactive_days: { type: integer, minimum: 0 }
        result: { type: string }
        error_category: { type: ["string", "null"] }
        retryable: { type: boolean }
        gate: { type: string }
        blocking_count: { type: integer, minimum: 0 }
        formal_stage: { type: string }
        project_status: { type: string }
        affected_stage_count: { type: integer, minimum: 0 }
        case_id: { type: string }
        case_version: { type: string }
        difficulty: { type: string }
        question_index: { type: integer, minimum: 0 }
        disclosure_rule_hit: { type: ["string", "null"] }
        attempt_id: { type: string }
        summary_version: { type: integer, minimum: 1 }
        coverage_score_band: { type: string }
        missing_dimension_count: { type: integer, minimum: 0 }
        attempt_number: { type: integer, minimum: 1 }
        report_action: { type: string, enum: [compile, release] }

    ProductEventBatchRequest:
      type: object
      additionalProperties: false
      required: ["events"]
      properties:
        events:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ProductEvent"

    ProductEventBatchResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
        data:
          type: object
          required: ["accepted_count", "rejected_count", "duplicates_count"]
          properties:
            accepted_count:
              type: integer
            rejected_count:
              type: integer
            duplicates_count:
              type: integer
        meta:
          $ref: "#/components/schemas/Meta"

    QuickCompletionRateResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
        data:
          type: object
          required: ["metric_name", "numerator", "denominator", "observation_window", "sample_size"]
          properties:
            metric_name:
              type: string
              enum: ["quick-completion-rate"]
            numerator:
              type: integer
            denominator:
              type: integer
            observation_window:
              type: string
              description: "观测窗口（如 7d）"
            sample_size:
              type: integer
            filters:
              type: object
              additionalProperties: true
              description: "筛选条件（如 source_kind、environment_exclude）"
            calculated_at:
              type: string
              format: date-time
        meta:
          $ref: "#/components/schemas/Meta"
