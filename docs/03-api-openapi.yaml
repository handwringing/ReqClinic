openapi: "3.1.0"
info:
  title: "需求问诊室 API"
  version: "1.3.0"
  description: |
    需求问诊室（ReqClinic）API v1.3 线协议。真实链路按本规范提供 HTTP API；演示链路仅以浏览器内 MockTransport 实现同一 operation 契约。覆盖快速问诊（P0）、正式项目（P1）和表达训练（P2）三种产品模式。

    ## v1.1 变更
    - servers URL 补齐 `/api/v1` 前缀
    - 删除用户级数据处理方式选择；敏感信息检测与最小化处理由服务端统一执行
    - 8 个 AI 端点统一返回 202 + job_id；新增 AsyncAcceptedResponse schema
    - 159 个对象 Schema 添加 additionalProperties: false；41 个 Schema 补充 required

    ## v1.2 变更
    - 异步轮询统一为 `/ai-jobs/{id}`，协议身份从认证上下文派生
    - 只认领指定快速问诊会话；认证凭证与产品埋点会话 ID 分离
    - 新增删除任务查询、严格事件 attributes、24 小时导出契约
    - 清理项目模式以及项目/来源出站策略，真实 AI 仅校验有效协议同意；所有示例通过 Schema 校验
    - 补齐页面恢复所需的读契约：快速问诊消息/当前问题、简报版本列表、正式项目基线/报告/变化列表、正式访谈/角色/证据追踪、冲突详情和训练反馈就绪状态

    ## v1.3 变更
    - 对齐当前实现：快速问诊和正式项目首期使用真实 HTTP + Job；表达训练真实 Runtime 待实现。
    - `TrainingCaseVersionDetail` 改为公开详情，不向浏览器返回 `answer_key`、完整 `disclosure_rules` 或隐藏事实。

    ## MockTransport 绑定
    - 本文是 MockTransport 与 HttpTransport 的共同线协议；两者共用相同 ApiClient、operationId、请求/响应类型和错误类型。
    - MockTransport 在浏览器内按 operationId 返回版本化 Fixture，不访问下方 servers、数据库或真实模型。
    - Mock handler 只能返回对应 operation 声明的状态码和 Schema；未注册 operation、Schema 不匹配或外部业务网络请求必须失败。
    - Mock 可模拟异步 Job、身份、协议同意、删除和错误状态，但不签发真实凭证、不形成法律记录、不执行服务器副作用。
    - 演示链路中的自定义输入仅进入本地 Draft Store，不得发送到 Fixture 分析 handler 或套用预生成结论。
    - 生产构建使用 HttpTransport，且不得通过运行时用户开关切回 MockTransport。

    ## 通用约定
    - 生产基础路径：`/api/v1`
    - 媒体类型：`application/json; charset=utf-8`
    - ID 为服务端生成的稳定不透明字符串；时间为 UTC ISO 8601
    - 所有真实项目端点要求认证会话，并按项目成员能力授权
    - 写命令携带 `Idempotency-Key`。同一用户、端点、键和请求哈希返回首次结果；请求哈希不同返回 `409 IDEMPOTENCY_CONFLICT`
    - 修改现有对象携带 `expected_version`；版本不一致返回 `409 VERSION_CONFLICT`
    - 列表使用 `limit` 与不透明 `cursor`，默认 50，最大 200
    - 响应只返回当前用户有权查看的字段；内部 Prompt、模型推理、密钥和文件系统路径永不返回

    ## actor_kind 分层鉴权（§2.1）
    调用方身份分为两类 `actor_kind`：
    - `guest`：凭 `session_key`（不可直接识别个人）标识，不要求注册。可调用快速问诊端点（§5A）、表达训练端点（§12A）、产品埋点端点（§12B）、协议同意与游客会话端点（§3A/§3B）。本地开发和 demo 环境允许 guest 通过受控 owner bridge 创建/升级自己的正式项目，生产环境可收紧为正式登录用户。
    - `user`：通过正式登录认证。可调用上述全部端点 + 正式项目端点（§5–§11，需 `project_members` 能力）+ 升级端点（§5A.15）。

    游客登录后只认领指定快速问诊会话，保留该会话 ID、版本、问答、简报和协议来源；同一游客身份下其他记录不受影响。

    ## 协议同意前置（§2.2）
    所有进入真实 AI 流程或直接触发模型调用的端点必须先校验有效 `agreement_consents` 记录：
    - 首次使用真实 AI 前必须勾选"已阅读并同意服务与数据处理协议"；未同意时不能提交真实 AI 问诊、分析运行或报告编译。
    - 重大更新生效后，用户下一次发起新的真实 AI 调用前必须重新同意；非重大更新既有有效同意继续有效。
    - 撤回后立即阻止新的模型调用，并取消尚未发送给模型供应商的排队任务。
    - 未认证调用方返回 `401 UNAUTHENTICATED`；已有用户或游客身份但未同意有效协议时调用以下端点返回 `403 AGREEMENT_REQUIRED`：`POST /projects`、`POST /projects/{id}/analysis-runs`、`POST /projects/{id}/reports`、`POST /quick-sessions`、`POST /quick-sessions/{id}/messages`、`POST /quick-sessions/{id}/understanding-review`、`POST /quick-sessions/{id}/option-preferences`、`POST /quick-sessions/{id}/briefs`、`POST /quick-sessions/{id}/upgrade`、`POST /training-attempts`、`POST /training-attempts/{id}/questions`。

    ## 应用层限流、超时与排队（§2.3）
    - 限流按 `actor_kind` + 操作类别滑动窗口，响应头携带 `X-RateLimit-Limit`、`X-RateLimit-Remaining`、`X-RateLimit-Reset`；超限返回 `429 RATE_LIMITED`，响应体含 `retry_after_seconds`，`retryable=true`。
    - 单项目并发未完成 AI Job 达上限返回 `429 MODEL_BUSY`；全局队列满返回 `429 QUEUE_FULL`。
    - HTTP 请求整体超时（非 AI 写命令）30s；AI 写命令只等待 1s 内返回 `202 + job_id`，不等待模型结果。超过确认阈值按 `504 REQUEST_TIMEOUT` 或等价网络超时处理，客户端可用同一 `Idempotency-Key` 重试并取得首次 Job 状态。
    - AI Job 单次模型调用超时 90s，按重试策略退避重试（最多 3 次）；Job 最终状态通过轮询获取。

    ## 身份与能力
    | 能力 | Owner | Editor | Reviewer | Viewer | Exporter |
    |---|---|---|---|---|---|
    | 读取项目 | ✓ | ✓ | ✓ | ✓ | ✓ |
    | 编辑内容/发起分析 | ✓ | ✓ |  |  |  |
    | 执行人工关口 | ✓ |  | ✓ |  |  |
    | 管理成员 | ✓ |  |  |  |  |
    | 编译报告草稿 | ✓ | ✓ | ✓ |  |  |
    | 发布报告 | ✓ |  | ✓ |  |  |
    | 下载报告 | ✓ |  | ✓ |  | ✓ |

    ## 认证
    - Bearer Token 认证（session-based），支持 Cookie 回退（`actor_kind=user`）
    - 游客会话认证通过 `X-Session-Key` Header 或 `guest_session` Cookie（`actor_kind=guest`），二者都承载原始 `session_key`
    - 单用户部署仍创建真实用户和成员记录
    - 对象 ID 猜测不能绕过成员校验
  contact:
    name: "ReqClinic Team"
  license:
    name: "Proprietary"
    url: "https://github.com/reqclinic"

x-stage-a-mock-contract:
  enabled_in: "stage-a-demo-only"
  transport: "in-browser"
  network_access: false
  contract_source: "this-document"
  fixture_source: "versioned-case-packages"
  production_switch: "build-time"

servers:
  - url: "https://api.reqclinic.com/api/v1"
    description: "生产服务器"
  - url: "https://dev-api.reqclinic.com/api/v1"
    description: "本地开发服务器"

security:
  - bearerAuth: []
  - cookieAuth: []

tags:
  - name: "项目与建档"
    description: "Projects & Intake — 项目创建、查询、修改与建档追加"
  - name: "领域画像"
    description: "Domain Profiles — 领域画像生成、查询、评审与领域包管理"
  - name: "来源与证据"
    description: "Sources & Evidence — 来源上传、查询与证据片段获取"
  - name: "分析与作业"
    description: "Analysis & Jobs — 异步分析运行、作业状态轮询与取消"
  - name: "需求工程"
    description: "Requirements Engineering — 成果、需求、Driver、验收标准、冲突、评审、未来场景等"
  - name: "评审与关口"
    description: "Reviews & Gates — 类型化评审、项目关口评审与冲突解决"
  - name: "基线与报告"
    description: "Baselines & Reports — 基线创建与批准、报告编译、发布与下载"
  - name: "变化管理"
    description: "Change Management — 变化预演、真实变化登记、确认与撤回"
  - name: "快速问诊"
    description: "Quick Sessions & Briefs — 快速问诊会话、覆盖槽位、理解确认、需求简报与升级"
  - name: "游客会话"
    description: "Guest Sessions & Claim — 游客会话签发、恢复与认领"
  - name: "协议同意"
    description: "Agreement Consents — 协议版本查询、同意、重新同意与撤回"
  - name: "表达训练"
    description: "Expression Training — 训练案例、追问、总结、反馈与完成"
  - name: "产品埋点"
    description: "Product Analytics Events — 事件批量接收与最小 SQL 报表"
  - name: "身份认证"
    description: "Authentication — 前端会话状态、退出和账户恢复触发；具体身份提供方由实现配置"

paths:
  # ── §2C 身份认证 ──

  /auth/session:
    get:
      tags: ["身份认证"]
      summary: "获取当前登录会话"
      description: |
        返回前端渲染所需的登录状态、用户摘要和能力标记。该端点只描述产品前端与认证层的会话读取契约；真实登录、注册、OAuth/OIDC 回调和多因素认证可由框架或身份提供方实现。
      operationId: "getAuthSession"
      security: []
      responses:
        "200":
          description: "当前登录会话"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAuthSessionResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/logout:
    post:
      tags: ["身份认证"]
      summary: "退出登录"
      description: "清除当前用户会话 Cookie/Token。未登录时返回成功的无副作用响应。"
      operationId: "logout"
      security:
        - bearerAuth: []
        - cookieAuth: []
        - {}
      responses:
        "200":
          description: "已退出或当前无登录会话"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLogoutResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/recovery/start:
    post:
      tags: ["身份认证"]
      summary: "发起账户恢复"
      description: "发起账户恢复或找回流程。具体邮件、短信、通行密钥或企业身份验证方式由身份模块实现；本端点只返回前端可展示的提交状态。"
      operationId: "startAccountRecovery"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRecoveryStartRequest"
      responses:
        "202":
          description: "恢复流程已受理"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthRecoveryStartResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ── §5 项目与建档 ──

  /projects:
    post:
      tags: ["项目与建档"]
      summary: "创建项目"
      description: |
        创建新项目，同时创建建档记录和 Owner 成员关系。调用者需有效登录账户和系统级 `create_project` 权限；项目尚不存在，不能检查项目内 Owner 能力。事务成功后调用者成为新项目 Owner。进入真实 AI 流程还需有效协议同意。

        创建请求不接受 `source_upload_ids`：项目 ID 尚不存在时无法创建项目内 Source。客户端先创建草稿项目，再逐个调用项目上传端点。
      operationId: "createProject"
      security:
        - bearerAuth: []
        - cookieAuth: []
      x-idempotent: true
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            examples:
              default:
                summary: "创建项目示例"
                value:
                  initial_request: "我们需要构建一个面向社区医院的在线问诊平台，支持多院区协同。"
                  name: null
                  decision_intent: null
                  selected_work_type: null
                  candidate_roles: []
                  candidate_constraints: []
      responses:
        "202":
          description: "Accepted - 异步任务已入队"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProjectAccepted"
              example:
                data:
                  project_id: "PRJ_..."
                  job_id: "JOB_..."
                  status: "queued"
                  status_url: "/api/v1/ai-jobs/JOB_..."
                meta:
                  request_id: "REQ_..."
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/AIActionForbidden"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "429":
          $ref: "#/components/responses/ModelRateLimited"
        "503":
          $ref: "#/components/responses/ModelUnavailable"

  /projects/{id}:
    get:
      tags: ["项目与建档"]
      summary: "查询项目"
      description: |
        返回项目概要、当前阶段、版本、阻断项和当前基线/报告引用。

        需 `读取项目` 能力。
      operationId: "getProject"
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: "项目详情"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetProjectResponse"
              examples:
                default:
                  value:
                    data:
                      id: "PRJ_..."
                      name: "在线问诊系统"
                      description: "构建面向社区医院的在线问诊平台"
                      status: "Eliciting"
                      risk_level: "medium"
                      language: "zh-CN"
                      version: 8
                      owner_id: "USR_..."
                      created_by: "USR_..."
                      current_domain_profile_id: "DP_..."
                      current_baseline:
                        id: "BL_..."
                        baseline_version: 1
                        status: "approved"
                      current_report: null
                      blockers:
                        - type: "conflict"
                          id: "CF_..."
                          description: "数据隐私与实时监控存在冲突"
                          severity: "high"
                      created_at: "2026-07-01T08:00:00Z"
                      updated_at: "2026-07-01T10:30:00Z"
                    meta:
                      request_id: "REQ_..."
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "429":
          $ref: "#/components/responses/ModelRateLimited"
        "503":
          $ref: "#/components/responses/ModelUnavailable"

    patch:
      tags: ["项目与建档"]
      summary: "修改项目"
      description: |
        修改名称、语言和风险等级等项目属性。需 `编辑内容/发起分析` 能力。

        项目和来源均不存在可配置的数据出站策略；触发真实 AI 时统一校验有效协议同意。
      operationId: "updateProject"
      security:
        - bearerAuth: []
        - cookieAuth: []
      x-versioned: true
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchProjectRequest"
            examples:
              default:
                value:
                  name: "在线问诊系统 V2"
                  description: "扩展至三甲医院协作场景"
                  risk_level: "high"
                  language: "zh-CN"
                  expected_version: 8
      responses:
        "200":
          description: "项目修改成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchProjectResponse"
              examples:
                default:
                  value:
                    data:
                      id: "PRJ_..."
                      owner_id: "USR_001"
                      name: "在线问诊系统 V2"
                      description: "扩展至三甲医院协作场景"
                      status: "Eliciting"
                      risk_level: "high"
                      language: "zh-CN"
                      version: 9
                      updated_at: "2026-07-01T11:00:00Z"
                    meta:
                      request_id: "REQ_..."
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          $ref: "#/components/responses/VersionConflict"
        "429":
          $ref: "#/components/responses/ModelRateLimited"
        "503":
          $ref: "#/components/responses/ModelUnavailable"

    delete:
      tags: ["项目与建档"]
      summary: "软删除正式项目"
      description: |
        软删除正式项目（对齐 §5.2、PRD §10.5、ADD §9.5）。创建 `delete_tasks` 记录（`scope=formal_project`），
        项目及其数据立即对普通用户和业务流程不可用，主存储在 30 天内物理清除；存在法律保留或合同义务时
        暂停物理清除并显示状态（`legal_hold=1`）。

        需 `Owner` 能力（只有项目所有者可以发起删除）。需 `Idempotency-Key`。无需 `expected_version`。
      operationId: "deleteProject"
      security:
        - bearerAuth: []
        - cookieAuth: []
      x-idempotent: true
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: "删除任务已受理，数据立即对用户不可用，30 天内物理清除"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTaskAccepted"
              examples:
                default:
                  value:
                    data:
                      delete_task_id: "DT_..."
                      scope: "formal_project"
                      target_id: "PRJ_..."
                      status: "pending"
                      estimated_purge_at: "2026-08-01T00:00:00Z"
                    meta:
                      request_id: "REQ_..."
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "409":
          $ref: "#/components/responses/LegalHoldConflict"
        "429":
          $ref: "#/components/responses/RateLimited"

  /delete-tasks/{id}:
    get:
      tags: ["项目与建档"]
      summary: "查询删除任务状态"
      description: |
        发起删除的用户/游客、相关正式项目 Owner 或系统管理员可以查询。其他主体与不存在统一返回
        `404 RESOURCE_NOT_FOUND`。查询任务不会恢复目标资源的读取权限。
      operationId: "getDeleteTask"
      security:
        - bearerAuth: []
        - cookieAuth: []
        - guestSessionAuth: []
        - guestSessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/DeleteTaskId"
      responses:
        "200":
          description: "删除任务状态"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTaskStatusResponse"
              examples:
                default:
                  value:
                    data:
                      delete_task_id: "DT_..."
                      scope: "formal_project"
                      target_id: "PRJ_..."
                      status: "in_progress"
                      legal_hold: false
                      legal_hold_reason: null
                      failure_reason: null
                      created_at: "2026-07-02T00:00:00Z"
                      updated_at: "2026-07-02T00:05:00Z"
                      completed_at: null
                      estimated_purge_at: "2026-08-01T00:00:00Z"
                    meta:
                      request_id: "REQ_..."
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /projects/{id}/intakes:
    post:
      tags: ["项目与建档"]
      summary: "追加建档记录"
      description: |
