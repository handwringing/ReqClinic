        generated_at:
          type: string
          format: date-time
        is_incomplete:
          type: boolean
        blocking_unknown_count:
          type: integer
          minimum: 0

    ListBriefVersionsResponse:
      type: object
      additionalProperties: false
      required: ["data", "meta"]
      properties:
